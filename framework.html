<style>
    .logo-container {
        padding: 20px 0;
    }

    /* The wrapper must be relative so the absolute sparkles stay inside it */
    .logo-wrapper {
        position: relative;
        display: inline-block; /* Hugs tightly to the image width */
        max-width: 600px;
    }

    .brand-logo-img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* The Sparkle CSS */
    .sparkle {
        position: absolute;
        color: #FCF6BA; /* Bright gold/white */
        font-size: 1.5rem;
        user-select: none; /* Prevents users from highlighting the star */
        pointer-events: none;
        
        /* Start invisible */
        opacity: 0; 
        transform: scale(0) rotate(0deg);
        
        /* The animation: runs for 3s, loops infinitely */
        animation: twinkle 4s ease-in-out infinite;
        
        /* Optional: Adds a tiny glow to the sparkle itself */
        filter: drop-shadow(0 0 8px rgba(252, 246, 186, 1));
    }

    @keyframes twinkle {
        0% {
            opacity: 0;
            transform: scale(0) rotate(0deg);
        }
        50% {
            opacity: 1;
            transform: scale(1.5) rotate(90deg); /* Peaks in brightness and size */
        }
        100% {
            opacity: 0;
            transform: scale(0) rotate(180deg); /* Fades out while spinning */
        }
    }
</style>
